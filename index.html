<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Corrida 3D</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main id="game">
      <canvas id="game-canvas" aria-label="Jogo de corrida 3D"></canvas>

      <section class="hud" aria-label="Interface do jogo">
        <div class="speedometer">
          <span id="speed-value">0</span>
          <small>km/h</small>
        </div>
        <div class="controls">
          <span>W / cima acelerar</span>
          <span>S / baixo frear e re</span>
          <span>A D / esquerda direita virar</span>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
